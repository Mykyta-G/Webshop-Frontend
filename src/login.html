<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <main class="flex justify-center items-center min-h-screen">
        <form action="" class="flex flex-col bg-gray-300 p-4">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" class="border">
            <label for="passw" class="mt-4">Password</label>
            <input type="password" name="passw" id="passw" class="border">
            <button type="submit" class="rounded-md bg-yellow-600 mt-4 p-1">Log in</button>
        </form>
    </main>
</body>
</html>
